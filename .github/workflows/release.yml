name: Release

# Automatically publishes a GitHub Release (with notes) whenever a version
# tag (e.g. v0.2.6) is pushed. HACS shows the version/changelog from GitHub
# Releases, so without a published Release it falls back to showing the
# latest commit instead of a version number.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
