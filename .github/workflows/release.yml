name: Release

# Automatically publishes a GitHub Release (with notes) whenever a version
# tag (e.g. v0.2.6) is pushed. HACS shows the version/changelog from GitHub
# Releases, so without a published Release it falls back to showing the
# latest commit instead of a version number.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog from annotated tag message
        id: tag
        run: |
          MSG="$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")"
          {
            echo "message<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag.outputs.message }}
          generate_release_notes: true
